<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>線のレシピ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --kraft:#fff6e3; --card:#fffaf0; --ink:#4a3520; --terra:#e2680c;
  --terra-soft:#f3a64a; --yellow:#fbc02d; --moss:#d98a13;
  --line:#f3dca6; --muted:#8a5e16; --new:#fdeec0;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background-color:var(--kraft);
  color:var(--ink);
  font-family:"M PLUS Rounded 1c",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(140% 80% at 50% -18%, rgba(251,192,45,.42), transparent 55%),
    radial-gradient(rgba(226,104,12,.05) 1px, transparent 1px);
  background-size:auto, 22px 22px;
  min-height:100vh;
}
.wrap{max-width:680px;margin:0 auto;padding:40px 22px 64px}
.eyebrow{font-size:12px;letter-spacing:.32em;color:var(--terra);margin:0 0 10px;font-weight:700}
h1{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:31px;margin:0 0 6px;letter-spacing:.04em}
.tag{font-family:"Zen Maru Gothic",sans-serif;font-weight:500;color:var(--muted);font-size:14px;margin:0 0 30px}

/* レシピカード */
.card{
  position:relative;background:var(--card);
  border:1px solid var(--line);border-radius:18px;
  box-shadow:0 1px 0 #fff inset, 0 18px 34px -24px rgba(226,104,12,.55);
  padding:36px 22px 26px;
}
.card::before{content:"レシピ";position:absolute;top:-13px;left:24px;background:var(--terra);
  color:#fff;font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:12px;letter-spacing:.3em;
  padding:4px 14px;border-radius:99px;box-shadow:0 6px 14px -8px rgba(226,104,12,.9)}
.slots{display:flex;flex-direction:column;gap:6px}
.slot{
  position:relative;text-align:center;padding:22px 58px;border-radius:14px;
  background:var(--new);box-shadow:0 1px 0 #fff inset, 0 8px 16px -14px rgba(226,104,12,.5);
}
.slot.anim{animation:pop .45s cubic-bezier(.2,.8,.2,1)}
@keyframes pop{0%{opacity:0;transform:translateY(8px) rotate(-.6deg)}100%{opacity:1;transform:none}}
.meta{min-width:0}
.name{font-family:"Zen Maru Gothic",sans-serif;font-size:30px;font-weight:700;line-height:1.3;letter-spacing:.04em}
.cat{font-size:11px;color:var(--muted);letter-spacing:.14em;margin-top:6px;font-weight:500}
.slot-tools{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:4px}
.icon{
  width:34px;height:34px;border:1px solid var(--line);background:#fdfaf3;border-radius:99px;
  display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:.15s}
.icon:hover{border-color:var(--terra-soft);color:var(--terra)}
.icon svg{width:16px;height:16px;display:block}
.icon.locked{background:var(--terra);border-color:var(--terra);color:#fff}
.icon.locked svg{fill:#fff}

/* × の手描き線 */
.x{height:30px;display:flex;align-items:center;justify-content:center;color:var(--terra)}
.x svg{width:26px;height:26px;opacity:.85}

/* ボタン */
.draw{
  width:100%;margin-top:22px;border:none;cursor:pointer;
  background:var(--terra);color:#fff;border-radius:14px;padding:18px;
  font-family:"Zen Maru Gothic",sans-serif;font-size:20px;letter-spacing:.18em;font-weight:700;
  box-shadow:0 12px 22px -12px rgba(226,104,12,.85);transition:.15s}
.draw:hover{background:#cf5c08}
.draw:active{transform:translateY(1px)}

/* オプション */
.opts{margin-top:18px;display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center}
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;color:var(--ink);user-select:none}
.track{width:38px;height:21px;border-radius:99px;background:var(--line);position:relative;transition:.18s;flex:none}
.track::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;
  background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.18)}
.switch input{position:absolute;opacity:0;width:0;height:0}
.switch input:checked + .track{background:var(--moss)}
.switch input:checked + .track::after{transform:translateX(17px)}
.linkbtn{background:none;border:none;color:var(--terra);cursor:pointer;font-size:13px;
  font-family:inherit;text-decoration:underline;text-underline-offset:3px;padding:0}

/* カテゴリしぼり */
.filters{margin-top:14px;display:none;flex-wrap:wrap;gap:8px;
  border-top:1px dashed var(--line);padding-top:16px}
.filters.open{display:flex}
.chip{font-size:12px;border:1px solid var(--line);background:#fdfaf3;color:var(--muted);
  border-radius:99px;padding:6px 13px;cursor:pointer;letter-spacing:.04em;transition:.15s}
.chip[aria-pressed="true"]{background:var(--yellow);border-color:#eaa90f;color:var(--ink);font-weight:700}

/* 履歴 */
.hist{margin-top:40px}
.hist-head{display:flex;align-items:baseline;justify-content:space-between;
  border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:4px}
.hist-head h2{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:16px;margin:0;letter-spacing:.1em}
.hist ul{list-style:none;margin:0;padding:0}
.hist li{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px dashed var(--line)}
.hist .when{font-size:11px;color:var(--muted);width:78px;flex:none;font-variant-numeric:tabular-nums}
.hist .combo{flex:1;font-size:14px}
.hist .combo .sep{color:var(--terra);margin:0 6px}
.hist .copy{font-size:11px;color:var(--muted);border:1px solid var(--line);background:#fdfaf3;
  border-radius:99px;padding:4px 11px;cursor:pointer;flex:none}
.hist .copy:hover{border-color:var(--terra-soft);color:var(--terra)}
.empty{color:var(--muted);font-size:13px;padding:18px 2px;font-family:"Zen Maru Gothic",sans-serif;font-weight:500}
.note{margin-top:30px;font-size:12px;color:var(--muted);line-height:1.7}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fdfaf3;padding:10px 20px;border-radius:99px;font-size:13px;
  opacity:0;transition:.25s;pointer-events:none;z-index:9}
.toast.show{opacity:1;transform:translateX(-50%)}
:focus-visible{outline:2px solid var(--terra);outline-offset:2px;border-radius:3px}
@media (max-width:480px){
  h1{font-size:25px}.name{font-size:24px}
  .slot{padding:18px 48px}
}
@media (prefers-reduced-motion:reduce){.slot.anim{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">路地裏のアトリエ</p>
  <h1>線のレシピ</h1>
  <p class="tag">線で、3つを重ねて遊ぶ。</p>

  <div class="card">
    <div class="slots" id="slots"></div>
    <button class="draw" id="drawBtn">レシピをひく</button>
    <div class="opts">
      <label class="switch">
        <input type="checkbox" id="strict" checked>
        <span class="track"></span><span>カテゴリをシャッフル</span>
      </label>
      <button class="linkbtn" id="filterToggle">カテゴリでしぼる</button>
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <div class="hist">
    <div class="hist-head">
      <h2>今日のレシピ</h2>
    </div>
    <ul id="histList"></ul>
    <p class="empty" id="histEmpty">まだ何も引いていません。上のボタンからどうぞ。</p>
  </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const MOTIFS = [{"n": "りんご", "c": "食べもの・カフェ", "new": false}, {"n": "葉っぱ", "c": "植物・ボタニカル", "new": false}, {"n": "デイジー", "c": "植物・ボタニカル", "new": false}, {"n": "小花", "c": "植物・ボタニカル", "new": false}, {"n": "木の枝", "c": "植物・ボタニカル", "new": false}, {"n": "雲", "c": "空・光・気配", "new": false}, {"n": "太陽", "c": "空・光・気配", "new": false}, {"n": "月", "c": "空・光・気配", "new": false}, {"n": "星", "c": "空・光・気配", "new": false}, {"n": "キラキラ", "c": "空・光・気配", "new": false}, {"n": "ハート", "c": "囲み・マーク・装飾", "new": false}, {"n": "リボン", "c": "囲み・マーク・装飾", "new": false}, {"n": "糸", "c": "手芸・裁縫", "new": false}, {"n": "ステッチ", "c": "手芸・裁縫", "new": false}, {"n": "波線", "c": "線・パターン", "new": false}, {"n": "チェック柄", "c": "線・パターン", "new": false}, {"n": "格子柄", "c": "線・パターン", "new": false}, {"n": "フィルム枠", "c": "カメラ・アナログ・紙もの", "new": false}, {"n": "カメラ", "c": "カメラ・アナログ・紙もの", "new": false}, {"n": "鉛筆線", "c": "文房具・画材", "new": false}, {"n": "落書き矢印", "c": "囲み・マーク・装飾", "new": false}, {"n": "丸囲み", "c": "囲み・マーク・装飾", "new": false}, {"n": "タグ", "c": "囲み・マーク・装飾", "new": false}, {"n": "クリップ", "c": "文房具・画材", "new": false}, {"n": "マスキングテープ風", "c": "カメラ・アナログ・紙もの", "new": false}, {"n": "双葉", "c": "植物・ボタニカル", "new": false}, {"n": "木の実", "c": "植物・ボタニカル", "new": false}, {"n": "羽根", "c": "生きもの", "new": false}, {"n": "鳥", "c": "生きもの", "new": false}, {"n": "ちょうちょ", "c": "生きもの", "new": false}, {"n": "コーヒーカップ", "c": "食べもの・カフェ", "new": false}, {"n": "パン", "c": "食べもの・カフェ", "new": false}, {"n": "ティーポット", "c": "食べもの・カフェ", "new": false}, {"n": "椅子", "c": "暮らし・もの", "new": false}, {"n": "窓", "c": "暮らし・もの", "new": false}, {"n": "小さな家", "c": "暮らし・もの", "new": false}, {"n": "本", "c": "暮らし・もの", "new": false}, {"n": "キャンドル", "c": "暮らし・もの", "new": false}, {"n": "虹", "c": "空・光・気配", "new": false}, {"n": "雨粒", "c": "空・光・気配", "new": false}, {"n": "雪の結晶", "c": "空・光・気配", "new": false}, {"n": "泡", "c": "空・光・気配", "new": false}, {"n": "渦巻き", "c": "線・パターン", "new": false}, {"n": "花冠", "c": "植物・ボタニカル", "new": false}, {"n": "毛糸", "c": "手芸・裁縫", "new": false}, {"n": "落ち葉", "c": "植物・ボタニカル", "new": false}, {"n": "木", "c": "植物・ボタニカル", "new": false}, {"n": "ドット", "c": "線・パターン", "new": false}, {"n": "パッチワーク風", "c": "線・パターン", "new": false}, {"n": "手描き吹き出し", "c": "囲み・マーク・装飾", "new": false}, {"n": "チューリップ", "c": "植物・ボタニカル", "new": true}, {"n": "きのこ", "c": "植物・ボタニカル", "new": true}, {"n": "どんぐり", "c": "植物・ボタニカル", "new": true}, {"n": "クローバー", "c": "植物・ボタニカル", "new": true}, {"n": "ドライフラワー", "c": "植物・ボタニカル", "new": true}, {"n": "鉢植え", "c": "植物・ボタニカル", "new": true}, {"n": "流れ星", "c": "空・光・気配", "new": true}, {"n": "土星", "c": "空・光・気配", "new": true}, {"n": "三日月", "c": "空・光・気配", "new": true}, {"n": "光のすじ", "c": "空・光・気配", "new": true}, {"n": "もや・霧", "c": "空・光・気配", "new": true}, {"n": "人影", "c": "空・光・気配", "new": true}, {"n": "影", "c": "空・光・気配", "new": true}, {"n": "ドーナツ", "c": "食べもの・カフェ", "new": true}, {"n": "クッキー", "c": "食べもの・カフェ", "new": true}, {"n": "ケーキ", "c": "食べもの・カフェ", "new": true}, {"n": "ジャム瓶", "c": "食べもの・カフェ", "new": true}, {"n": "クロワッサン", "c": "食べもの・カフェ", "new": true}, {"n": "ボタン", "c": "手芸・裁縫", "new": true}, {"n": "安全ピン", "c": "手芸・裁縫", "new": true}, {"n": "はさみ", "c": "手芸・裁縫", "new": true}, {"n": "万年筆", "c": "文房具・画材", "new": true}, {"n": "絵筆", "c": "文房具・画材", "new": true}, {"n": "パレット", "c": "文房具・画材", "new": true}, {"n": "定規", "c": "文房具・画材", "new": true}, {"n": "ノート", "c": "文房具・画材", "new": true}, {"n": "フィルムロール", "c": "カメラ・アナログ・紙もの", "new": true}, {"n": "レコード", "c": "カメラ・アナログ・紙もの", "new": true}, {"n": "ルーペ", "c": "カメラ・アナログ・紙もの", "new": true}, {"n": "古時計", "c": "カメラ・アナログ・紙もの", "new": true}, {"n": "封筒", "c": "カメラ・アナログ・紙もの", "new": true}, {"n": "ポストカード", "c": "カメラ・アナログ・紙もの", "new": true}, {"n": "鍵", "c": "暮らし・もの", "new": true}, {"n": "メガネ", "c": "暮らし・もの", "new": true}, {"n": "傘", "c": "暮らし・もの", "new": true}, {"n": "ランプ", "c": "暮らし・もの", "new": true}, {"n": "電球", "c": "暮らし・もの", "new": true}, {"n": "ねこ", "c": "生きもの", "new": true}, {"n": "みつばち", "c": "生きもの", "new": true}, {"n": "てんとう虫", "c": "生きもの", "new": true}, {"n": "かたつむり", "c": "生きもの", "new": true}, {"n": "点線", "c": "線・パターン", "new": true}, {"n": "破線", "c": "線・パターン", "new": true}, {"n": "ストライプ", "c": "線・パターン", "new": true}, {"n": "ひし形", "c": "線・パターン", "new": true}, {"n": "ガーランド", "c": "囲み・マーク・装飾", "new": true}, {"n": "角丸フレーム", "c": "囲み・マーク・装飾", "new": true}, {"n": "アンダーライン", "c": "囲み・マーク・装飾", "new": true}, {"n": "二重丸", "c": "囲み・マーク・装飾", "new": true}];
const CATEGORIES = ["植物・ボタニカル", "空・光・気配", "食べもの・カフェ", "手芸・裁縫", "文房具・画材", "カメラ・アナログ・紙もの", "暮らし・もの", "生きもの", "線・パターン", "囲み・マーク・装飾"];
const PIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 3h6l-1 6 3 3v1H7v-1l3-3-1-6z"/></svg>';
const REROLL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>';
const XMARK = '<svg viewBox="0 0 40 40"><path d="M10 20 Q20 19 30 20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M20 10 Q21 20 20 30" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>';

let active = new Set(CATEGORIES);
let slots = [null, null, null];
let locks = [false, false, false];
let history = [];

const $ = id => document.getElementById(id);
const pool = () => MOTIFS.filter(m => active.has(m.c));

function pickSlots(){
  const p = pool();
  const usedNames = new Set();
  const usedCats = new Set();
  slots.forEach((m,i)=>{ if(locks[i] && m){ usedNames.add(m.n); usedCats.add(m.c); }});
  const strict = $("strict").checked;
  for(let i=0;i<3;i++){
    if(locks[i] && slots[i]) continue;
    let cand = p.filter(m=>!usedNames.has(m.n));
    if(strict){
      const c2 = cand.filter(m=>!usedCats.has(m.c));
      if(c2.length) cand = c2;            // 足りなければカテゴリ条件は緩める
    }
    if(!cand.length) cand = p;            // プールが極端に小さいとき
    if(!cand.length){ slots[i]=null; continue; }
    const pick = cand[Math.floor(Math.random()*cand.length)];
    slots[i]=pick; usedNames.add(pick.n); usedCats.add(pick.c);
  }
}

function render(){
  const wrap = $("slots"); wrap.innerHTML="";
  slots.forEach((m,i)=>{
    if(i>0){ const x=document.createElement("div"); x.className="x"; x.innerHTML=XMARK; wrap.appendChild(x); }
    const row=document.createElement("div"); row.className="slot anim";
    if(m){
      row.innerHTML =
        '<div class="meta"><div class="name">'+m.n+'</div>'+
          '<div class="cat">'+m.c+'</div></div>'+
        '<div class="slot-tools">'+
          '<button class="icon reroll" title="この枠だけ引きなおす" aria-label="この枠だけ引きなおす">'+REROLL+'</button>'+
          '<button class="icon lock'+(locks[i]?' locked':'')+'" title="この枠を固定" aria-label="この枠を固定" aria-pressed="'+locks[i]+'">'+PIN+'</button>'+
        '</div>';
    } else {
      row.innerHTML='<div class="meta"><div class="name" style="color:var(--muted)">—</div><div class="cat">カテゴリを1つ以上選んでください</div></div>';
    }
    wrap.appendChild(row);
    const rr=row.querySelector(".reroll"); if(rr) rr.onclick=()=>rerollOne(i);
    const lk=row.querySelector(".lock"); if(lk) lk.onclick=()=>{locks[i]=!locks[i];render();};
  });
}

function drawAll(){ pickSlots(); render(); logCurrent(); }
function rerollOne(i){
  const p=pool(); if(!p.length) return;
  const others=new Set(slots.filter((_,k)=>k!==i&&slots[k]).map(m=>m.n));
  const cats=new Set(slots.filter((_,k)=>k!==i&&slots[k]).map(m=>m.c));
  let cand=p.filter(m=>!others.has(m.n));
  if($("strict").checked){ const c2=cand.filter(m=>!cats.has(m.c)); if(c2.length) cand=c2; }
  if(!cand.length) cand=p;
  slots[i]=cand[Math.floor(Math.random()*cand.length)];
  render(); logCurrent();
}

function stamp(){
  const d=new Date(), p=n=>String(n).padStart(2,"0");
  return {date:`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`,
          hm:`${p(d.getHours())}:${p(d.getMinutes())}`};
}
function logCurrent(){
  if(slots.some(m=>!m)) return;
  const t=stamp();
  history.unshift({date:t.date, hm:t.hm, names:slots.map(m=>m.n)});
  if(history.length>200) history.pop();
  renderHistory(); save();
}
function renderHistory(){
  const list=$("histList"); list.innerHTML="";
  $("histEmpty").style.display = history.length? "none":"block";
  history.forEach(h=>{
    const li=document.createElement("li");
    const combo=h.names.join('<span class="sep">＋</span>');
    li.innerHTML='<span class="when">'+h.date.slice(5)+' '+h.hm+'</span>'+
      '<span class="combo">'+combo+'</span>'+
      '<button class="copy">コピー</button>';
    li.querySelector(".copy").onclick=()=>copy(h.names.join(" ＋ "),"レシピをコピーしました");
    list.appendChild(li);
  });
}

function buildFilters(){
  const box=$("filters");
  CATEGORIES.forEach(c=>{
    const b=document.createElement("button");
    b.className="chip"; b.textContent=c; b.setAttribute("aria-pressed","true");
    b.onclick=()=>{
      if(active.has(c)){ if(active.size===1) return; active.delete(c); b.setAttribute("aria-pressed","false"); }
      else { active.add(c); b.setAttribute("aria-pressed","true"); }
    };
    box.appendChild(b);
  });
}

function copy(text,msg){
  navigator.clipboard?.writeText(text).then(()=>toast(msg)).catch(()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);
    ta.select();try{document.execCommand("copy");toast(msg);}catch(e){}ta.remove();
  });
}
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1600);}

$("drawBtn").onclick=drawAll;
$("filterToggle").onclick=()=>$("filters").classList.toggle("open");

const STORE_KEY="sen-no-recipe-v1";
const byName={}; MOTIFS.forEach(m=>byName[m.n]=m);
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({date:stamp().date, items:history})); }catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY); if(!raw) return;
    const d=JSON.parse(raw);
    if(d && d.date===stamp().date && Array.isArray(d.items)) history=d.items;
  }catch(e){}
}

buildFilters();
load();
renderHistory();
if(history.length){
  const s=history[0].names.map(n=>byName[n]);
  if(s.every(Boolean)){ slots=s; locks=[false,false,false]; render(); }
  else drawAll();
} else {
  drawAll();
}
</script>
</body>
</html>
